name: Generate Repository Statistics

on:
  schedule:
    # Run daily at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  generate-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Generate Stats JSON
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Fetch repo data once
        REPOS=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
          "https://api.github.com/users/HowieDuhzit/repos?per_page=100&sort=updated&direction=desc")

        # Compute stats from actual data
        STARS=$(echo "$REPOS" | jq '[.[] | select(.fork == false) | .stargazers_count] | add // 0')
        FORKS=$(echo "$REPOS" | jq '[.[] | select(.fork == false) | .forks_count] | add // 0')
        REPOS_COUNT=$(echo "$REPOS" | jq '[.[] | select(.fork == false)] | length')

        # Extract top languages (count occurrences, sort by frequency)
        TOP_LANGS=$(echo "$REPOS" | jq -r '[.[] | select(.fork == false and .language != null) | .language] | group_by(.) | sort_by(-length) | .[0:5] | map(.[0])')

        # Get most recently updated repos (non-fork)
        RECENT=$(echo "$REPOS" | jq -r '[.[] | select(.fork == false)] | .[0:5] | map(.name)')

        # Build JSON
        cat > stats.json << EOF
        {
          "total_stars": $STARS,
          "total_forks": $FORKS,
          "total_repos": $REPOS_COUNT,
          "last_updated": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
          "top_languages": $TOP_LANGS,
          "recent_projects": $RECENT
        }
        EOF

        echo "Generated stats.json:"
        echo "  Stars: $STARS"
        echo "  Forks: $FORKS"
        echo "  Repos: $REPOS_COUNT"
        echo "  Languages: $TOP_LANGS"
        echo "  Recent: $RECENT"

    - name: Upload Stats
      uses: actions/upload-artifact@v4
      with:
        name: github-stats
        path: stats.json
        retention-days: 30

    - name: Commit Stats
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add stats.json
        if git diff --staged --quiet; then
          echo "No changes to stats.json"
        else
          git commit -m "Update repository statistics"
          git push
        fi
